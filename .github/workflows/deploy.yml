name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1' # Updated to match your local SDK and Dart 3.11.0 requirement
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web App
        # The base-href must match your repository name for GitHub Pages to route correctly
        run: flutter build web --release --base-href "/google-io-vibe-code-app/" --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
